<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberTube</title>

<style>
:root{
  --bg:#0f0f0f;
  --card:#1c1c1c;
  --text:white;
  --accent:#ff0033;
}

.light{
  --bg:#f2f2f2;
  --card:white;
  --text:#111;
}

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

header{
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--card);
  position:sticky;
  top:0;
  z-index:1000;
}

.logo{
  font-weight:bold;
  font-size:20px;
  color:var(--accent);
}

button{
  background:var(--accent);
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:5px;
  cursor:pointer;
}

.search-bar{
  padding:10px;
}

.search-bar input{
  width:100%;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
}

.section{
  margin:20px 0;
}

.section h2{
  margin-left:10px;
}

.video-row{
  display:flex;
  overflow-x:auto;
  gap:15px;
  padding:10px;
}

.video-card{
  min-width:200px;
  cursor:pointer;
  transition:0.3s;
}

.video-card:hover{
  transform:scale(1.05);
}

.video-card img{
  width:100%;
  border-radius:10px;
}

iframe{
  width:100%;
  height:220px;
  border-radius:10px;
}

.loader{
  text-align:center;
  padding:20px;
}

.loader div{
  width:30px;
  height:30px;
  border:4px solid var(--accent);
  border-top:4px solid transparent;
  border-radius:50%;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<header>
  <div class="logo">⚡ CyberTube</div>
  <button onclick="toggleTheme()">🌙</button>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search videos...">
</div>

<div id="content"></div>

<script>
const apiKey="AIzaSyDW45acEP2OV1JeovQbmP0IoPdBANYMHb4";
const content=document.getElementById("content");

function toggleTheme(){
  document.body.classList.toggle("light");
}

function showLoader(){
  content.innerHTML=`<div class="loader"><div></div></div>`;
}

function fetchVideos(query,containerId){
  fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=8&q=${query}&key=${apiKey}`)
  .then(res=>res.json())
  .then(data=>{
    const container=document.getElementById(containerId);
    data.items.forEach(video=>{
      container.innerHTML+=`
      <div class="video-card" onclick="openWatch('${video.id.videoId}','${video.snippet.title.replace(/'/g,"")}')">
        <img src="${video.snippet.thumbnails.medium.url}">
        <p>${video.snippet.title}</p>
      </div>`;
    });
  });
}

function createSection(title,query){
  const id=title.replace(/\W/g,"");
  content.innerHTML+=`
  <div class="section">
    <h2>${title}</h2>
    <div class="video-row" id="${id}"></div>
  </div>`;
  fetchVideos(query,id);
}

function loadHome(){
  showLoader();
  setTimeout(()=>{
    content.innerHTML="";
    createSection("🔥 Trending","trending videos");
    createSection("🔐 Cyber Security","cyber security tutorial");
    createSection("💻 Web Designing","web design html css");
    createSection("🚀 Space Research","space documentary");
    createSection("📱 App Development","android app development");
    createSection("🎵 Music","trending music");
  },500);
}

function openWatch(videoId,title){
  showLoader();
  setTimeout(()=>{
    content.innerHTML=`
      <button onclick="loadHome()">⬅ Back</button>
      <h2>${title}</h2>
      <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
      <div class="section">
        <h2>Recommended</h2>
        <div class="video-row" id="recommend"></div>
      </div>
    `;
    fetchVideos("related "+title,"recommend");
  },500);
}

document.getElementById("searchInput").addEventListener("keypress",function(e){
  if(e.key==="Enter"){
    showLoader();
    setTimeout(()=>{
      content.innerHTML="";
      createSection("Search Results",this.value);
    },500);
  }
});

loadHome();
</script>

</body>
</html>
